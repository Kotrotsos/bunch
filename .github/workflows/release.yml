name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Bunch ${{ github.ref_name }}"
          releaseBody: |
            See the assets below to download the installer for your platform.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles dmg

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Wait for release assets
        run: sleep 30

      - name: Get version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release download "$REF_NAME" \
            --repo "$REPO" \
            --pattern "*.dmg" \
            --dir artifacts

      - name: Compute SHA256 checksums
        id: sha
        run: |
          AARCH64_DMG=$(ls artifacts/*aarch64*.dmg 2>/dev/null || ls artifacts/*arm64*.dmg 2>/dev/null)
          X64_DMG=$(ls artifacts/*x64*.dmg 2>/dev/null || ls artifacts/*x86_64*.dmg 2>/dev/null)

          echo "aarch64=$(sha256sum "$AARCH64_DMG" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64=$(sha256sum "$X64_DMG" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA_AARCH64: ${{ steps.sha.outputs.aarch64 }}
          SHA_X64: ${{ steps.sha.outputs.x64 }}
        run: |
          cat > bunch.rb << 'CASK'
          cask "bunch" do
            arch arm: "aarch64", intel: "x64"
          CASK

          cat >> bunch.rb << CASK
            version "${VERSION}"
            sha256 arm:   "${SHA_AARCH64}",
                   intel: "${SHA_X64}"
            url "https://github.com/${OWNER}/bunch/releases/download/v#{version}/Bunch_#{version}_#{arch}.dmg"
            name "Bunch"
            desc "Claude Code Config Manager"
            homepage "https://github.com/${OWNER}/bunch"
            depends_on macos: ">= :catalina"
            app "Bunch.app"
          end
          CASK

          # Get existing file SHA if it exists
          EXISTING_SHA=$(curl -s -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            "https://api.github.com/repos/${OWNER}/homebrew-bunch/contents/Casks/bunch.rb" | jq -r '.sha // empty')

          # Push to homebrew-bunch repo
          if [ -n "$EXISTING_SHA" ]; then
            PAYLOAD=$(jq -n \
              --arg content "$(base64 -w0 bunch.rb)" \
              --arg message "Update bunch to ${VERSION}" \
              --arg sha "$EXISTING_SHA" \
              '{message: $message, content: $content, sha: $sha}')
          else
            PAYLOAD=$(jq -n \
              --arg content "$(base64 -w0 bunch.rb)" \
              --arg message "Update bunch to ${VERSION}" \
              '{message: $message, content: $content}')
          fi

          curl -L -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/homebrew-bunch/contents/Casks/bunch.rb" \
            -d "$PAYLOAD"
